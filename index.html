<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<title>UrbanSportTalent - App PRO</title>

<!-- LIBS OK ORDER -->
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf-autotable/3.5.31/jspdf.plugin.autotable.min.js"></script>

<style>
body{font-family:Arial;background:#0d0d0d;color:#fff;padding:20px}
.container{max-width:700px;margin:auto}
.card{background:#1a1a1a;padding:20px;border-radius:10px}
input,select{width:100%;padding:10px;margin-top:10px;background:#111;color:#fff;border:1px solid #333;border-radius:5px}
button{margin-top:10px;padding:10px;width:100%;background:red;color:#fff;border:none;border-radius:5px;cursor:pointer}
.line{display:flex;justify-content:space-between;margin-top:5px}
.total{font-size:20px;margin-top:10px}
</style>
</head>

<body>
<div class="container">
<div class="card">

<select id="typeDoc">
<option>DEVIS</option>
<option>FACTURE</option>
</select>

<input id="numero" placeholder="Numéro auto">
<input type="file" id="logoInput">

<select id="clientList"><option value="">-- Client --</option></select>

<input id="clientNom" placeholder="Nom">
<input id="clientAdresse" placeholder="Adresse">
<input id="clientContact" placeholder="Contact">

<button id="saveClientBtn">💾 Enregistrer client</button>

<select id="categorie"></select>
<select id="souscat"></select>

<input id="qte" type="number" placeholder="Quantité">
<input id="prix" readonly>

<button id="addBtn">Ajouter prestation</button>

<div id="liste"></div>
<div id="totalBox" class="total">Total : 0€</div>

<input id="remise" type="number" placeholder="Remise %">

<button id="pdfBtn">📄 Générer PDF</button>

</div>
</div>

<script>

// ===== STATE =====
let prestations=[];
let clients=[];
let logoBase64="";

// ===== DATA =====
let data = {
  "Conception": [
    { nom: "Script", prix: 19.90 },
    { nom: "Storyboard", prix: 54.90 },
    { nom: "Réalisation", prix: 74.90 }
  ],
  "Captation audiovisuelle": [
    { nom: "Captation fixe", prix: 190.90 },
    { nom: "Captation mobile", prix: 118.90 },
    { nom: "Plan aérien drone", prix: 290.90 },
    { nom: "Interview", prix: 89.90 }
  ],
  "Production": [
    { nom: "Dérushage", prix: 44.90 },
    { nom: "Montage", prix: 69.90 },
    { nom: "Étalonnage", prix: 14.90 },
    { nom: "Traitement audio", prix: 14.90 },
    { nom: "Colorimétrie", prix: 79.90 }
  ],
  "Editing": [
    { nom: "Sous-titres & traduction", prix: 27.90 },
    { nom: "Mise au format livrable", prix: 9.90 }
  ],
  "Diffusion": [
    { nom: "Publication Snapchat", prix: 6.90 },
    { nom: "Publication Instagram/Facebook", prix: 25.90 },
    { nom: "Publication TikTok", prix: 14.50 }
]
};

// ===== DOM =====
const categorie=document.getElementById("categorie");
const souscat=document.getElementById("souscat");
const qte=document.getElementById("qte");
const prix=document.getElementById("prix");
const liste=document.getElementById("liste");
const totalBox=document.getElementById("totalBox");

const clientNom=document.getElementById("clientNom");
const clientAdresse=document.getElementById("clientAdresse");
const clientContact=document.getElementById("clientContact");
const clientList=document.getElementById("clientList");

const typeDoc=document.getElementById("typeDoc");
const numero=document.getElementById("numero");
const remise=document.getElementById("remise");

// ===== INIT =====
function init(){
  Object.keys(data).forEach(cat=>{
    let opt=document.createElement("option");
    opt.value=cat;
    opt.text=cat;
    categorie.add(opt);
  });

  updateSousCat();
  loadClients();
  generateNumber();
}

// ===== VALID =====
function err(msg){alert("⚠️ "+msg)}

// ===== CAT =====
function updateSousCat(){
  souscat.innerHTML="";
  data[categorie.value].forEach(item=>{
    let opt=document.createElement("option");
    opt.text=item.nom;
    opt.dataset.prix=item.prix;
    souscat.add(opt);
  });
  updatePrix();
}

function updatePrix(){
  prix.value=souscat.options[souscat.selectedIndex].dataset.prix;
}

categorie.onchange=updateSousCat;
souscat.onchange=updatePrix;

// ===== ADD =====
document.getElementById("addBtn").onclick=()=>{
  let q=parseFloat(qte.value);
  let p=parseFloat(prix.value);

  if(isNaN(q)||q<=0) return err("Quantité invalide");

  prestations.push({desc:souscat.value,qte:q,prix:p,total:q*p});
  render();
};

// ===== RENDER =====
function render(){
  liste.innerHTML="";

  prestations.forEach((p,i)=>{
    let div=document.createElement("div");
    div.className="line";
    div.innerHTML=`${p.desc} ${p.qte} x ${p.prix}€ = ${p.total.toFixed(2)}€ <button onclick="removeItem(${i})">❌</button>`;
    liste.appendChild(div);
  });

  let total=prestations.reduce((s,p)=>s+p.total,0);
  totalBox.innerText="Total : "+total.toFixed(2)+"€";
}

window.removeItem=function(i){
  prestations.splice(i,1);
  render();
}

// ===== CLIENT =====
document.getElementById("saveClientBtn").onclick=()=>{
  if(!clientNom.value.trim()) return err("Nom requis");

  let c={nom:clientNom.value,adresse:clientAdresse.value,contact:clientContact.value};
  clients.push(c);

  localStorage.setItem("clients",JSON.stringify(clients));
  loadClients();
};

function loadClients(){
  let saved=localStorage.getItem("clients");
  if(saved) clients=JSON.parse(saved);

  clientList.innerHTML='<option value="">-- Client --</option>';

  clients.forEach((c,i)=>{
    let opt=document.createElement("option");
    opt.value=i;
    opt.text=c.nom;
    clientList.add(opt);
  });
}

clientList.onchange=()=>{
  let c=clients[clientList.value];
  if(!c) return;
  clientNom.value=c.nom;
  clientAdresse.value=c.adresse;
  clientContact.value=c.contact;
}

// ===== LOGO =====
document.getElementById("logoInput").addEventListener("change",e=>{
  let reader=new FileReader();
  reader.onload=e=>logoBase64=e.target.result;
  reader.readAsDataURL(e.target.files[0]);
});

// ===== NUMERO =====
function generateNumber(){
  let n=localStorage.getItem("num")||1;
  numero.value=(typeDoc.value==="DEVIS"?"DEVIS":"FACT")+"-"+String(n).padStart(3,"0");
  localStorage.setItem("num",parseInt(n)+1);
}

typeDoc.onchange=generateNumber;

// ===== PDF =====
document.getElementById("pdfBtn").onclick=()=>{
  try{
    if(!clientNom.value.trim()) return err("Client manquant");
    if(prestations.length===0) return err("Aucune prestation");

    const { jsPDF } = window.jspdf;
    let doc=new jsPDF();

    let pageWidth=doc.internal.pageSize.getWidth();

    if(logoBase64){
      doc.addImage(logoBase64,'PNG',pageWidth/2-25,10,50,20);
    }

    doc.setFontSize(16);
    doc.text(typeDoc.value+" "+numero.value,10,20);

    doc.setFontSize(10);
    doc.text("Client : "+clientNom.value,10,30);

    let table=[];
    let total=0;

    prestations.forEach(p=>{
      table.push([p.desc,p.qte,p.prix.toFixed(2)+"€",p.total.toFixed(2)+"€"]);
      total+=p.total;
    });

    doc.autoTable({
      startY:40,
      head:[["Désignation","Qté","PU","Total"]],
      body:table
    });

    let y=doc.lastAutoTable.finalY+10;

    let rem=(parseFloat(remise.value)||0)/100*total;
    let final=total-rem;

    doc.text("Total : "+total.toFixed(2)+"€",130,y);
    doc.text("Remise : -"+rem.toFixed(2)+"€",130,y+7);
    doc.text("TOTAL : "+final.toFixed(2)+"€",130,y+14);

    doc.setFontSize(8);
    doc.text("TVA non applicable, art. 293 B du CGI",10,y+30);
    doc.text("UrbanSportTalent",pageWidth/2-20,290);

    doc.save("document.pdf");

  }catch(e){
    console.error(e);
    alert("Erreur PDF");
  }
}

init();

</script>
</body>
</html>
