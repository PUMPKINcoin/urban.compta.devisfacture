<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<title>UrbanSportTalent App</title>

<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf-autotable/3.5.31/jspdf.plugin.autotable.min.js"></script>

<style>
body {font-family: Arial; background:#0d0d0d; color:white; padding:20px;}
.container {max-width:700px; margin:auto;}
.card {background:#1a1a1a; padding:20px; border-radius:10px;}
input, select {width:100%; padding:10px; margin-top:10px; background:#111; color:white; border:1px solid #333; border-radius:5px;}
button {margin-top:10px; padding:10px; width:100%; background:red; color:white; border:none; border-radius:5px;}
.line {display:flex; justify-content:space-between; margin-top:5px;}
.total {font-size:20px; margin-top:10px;}
</style>
</head>

<body>
<div class="container">
<div class="card">

<select id="typeDoc">
<option>DEVIS</option>
<option>FACTURE</option>
</select>

<input id="numero" placeholder="Numéro">

<input type="file" id="logoInput">

<select id="clientList"></select>

<input id="clientNom" placeholder="Nom">
<input id="clientAdresse" placeholder="Adresse">
<input id="clientContact" placeholder="Contact">

<button id="saveClientBtn">💾 Enregistrer client</button>

<select id="categorie"></select>
<select id="souscat"></select>

<input id="qte" type="number" placeholder="Quantité">
<input id="prix" readonly>

<button id="addBtn">Ajouter prestation</button>

<div id="liste"></div>
<div id="totalBox" class="total">Total : 0€</div>

<input id="remise" type="number" placeholder="Remise %">

<button id="pdfBtn">📄 Générer PDF</button>

</div>
</div>

<script>

// ================= DATA =================
let data = {
  "Conception":[{nom:"Script",prix:19.9},{nom:"Storyboard",prix:54.9}],
  "Production":[{nom:"Montage",prix:69.9}]
};

// ================= STATE =================
let prestations = [];
let clients = [];
let logoBase64 = "";

// ================= DOM =================
let categorie = document.getElementById("categorie");
let souscat = document.getElementById("souscat");
let qte = document.getElementById("qte");
let prix = document.getElementById("prix");
let liste = document.getElementById("liste");
let totalBox = document.getElementById("totalBox");

let clientNom = document.getElementById("clientNom");
let clientAdresse = document.getElementById("clientAdresse");
let clientContact = document.getElementById("clientContact");
let clientList = document.getElementById("clientList");

let typeDoc = document.getElementById("typeDoc");
let numero = document.getElementById("numero");
let remise = document.getElementById("remise");

// ================= INIT =================
Object.keys(data).forEach(cat=>{
  let opt = document.createElement("option");
  opt.text = cat;
  categorie.add(opt);
});

categorie.onchange = updateSousCat;
updateSousCat();

// ================= FUNCTIONS =================

function showError(msg){ alert("⚠️ "+msg); }

// ---- Sous catégories
function updateSousCat(){
  souscat.innerHTML="";
  data[categorie.value].forEach(item=>{
    let opt=document.createElement("option");
    opt.text=item.nom;
    opt.dataset.prix=item.prix;
    souscat.add(opt);
  });
  updatePrix();
}

function updatePrix(){
  prix.value = souscat.options[souscat.selectedIndex].dataset.prix;
}

souscat.onchange = updatePrix;

// ---- Ajouter prestation
document.getElementById("addBtn").onclick = function(){

  let q = parseFloat(qte.value);
  let p = parseFloat(prix.value);

  if(isNaN(q) || q<=0) return showError("Quantité invalide");

  prestations.push({
    desc:souscat.value,
    qte:q,
    prix:p,
    total:q*p
  });

  afficher();
};

// ---- Affichage
function afficher(){
  liste.innerHTML="";
  prestations.forEach((p,i)=>{
    let div=document.createElement("div");
    div.className="line";
    div.innerHTML=`${p.desc} ${p.qte} x ${p.prix}€ = ${p.total.toFixed(2)}€ 
    <button onclick="del(${i})">❌</button>`;
    liste.appendChild(div);
  });

  let total = prestations.reduce((s,p)=>s+p.total,0);
  totalBox.innerText = "Total : "+total.toFixed(2)+"€";
}

// ---- Delete
function del(i){
  prestations.splice(i,1);
  afficher();
}

// ---- Clients
document.getElementById("saveClientBtn").onclick = function(){

  if(!clientNom.value) return showError("Nom requis");

  let c={
    nom:clientNom.value,
    adresse:clientAdresse.value,
    contact:clientContact.value
  };

  clients.push(c);
  updateClientList();
};

function updateClientList(){
  clientList.innerHTML="";
  clients.forEach((c,i)=>{
    let opt=document.createElement("option");
    opt.value=i;
    opt.text=c.nom;
    clientList.add(opt);
  });
}

clientList.onchange = function(){
  let c = clients[clientList.value];
  if(!c) return;
  clientNom.value=c.nom;
  clientAdresse.value=c.adresse;
  clientContact.value=c.contact;
};

// ---- Logo
document.getElementById("logoInput").addEventListener("change", e=>{
  let reader = new FileReader();
  reader.onload = e=> logoBase64 = e.target.result;
  reader.readAsDataURL(e.target.files[0]);
});

// ---- PDF
document.getElementById("pdfBtn").onclick = function(){

  if(!clientNom.value) return showError("Client manquant");
  if(prestations.length===0) return showError("Aucune prestation");

  const { jsPDF } = window.jspdf;
  let doc = new jsPDF();

  let y=20;

  if(logoBase64){
    doc.addImage(logoBase64,'PNG',80,10,50,20);
    y+=20;
  }

  doc.text(typeDoc.value+" "+numero.value,10,y);
  y+=10;

  doc.text(clientNom.value,10,y);
  y+=10;

  let table=[];
  let total=0;

  prestations.forEach(p=>{
    table.push([p.desc,p.qte,p.prix,p.total]);
    total+=p.total;
  });

  doc.autoTable({
    startY:y,
    head:[["Désignation","Qté","Prix","Total"]],
    body:table
  });

  let finalY = doc.lastAutoTable.finalY + 10;

  let rem = (parseFloat(remise.value)||0)/100 * total;
  let final = total - rem;

  doc.text("Total : "+total.toFixed(2)+"€",130,finalY);
  doc.text("Remise : -"+rem.toFixed(2)+"€",130,finalY+7);
  doc.text("Final : "+final.toFixed(2)+"€",130,finalY+14);

  doc.save("document.pdf");
};

</script>

</body>
</html>
